<header
  class="sticky top-0 z-20 border-b border-gray-200 bg-[rgba(248,250,252,0.9)] backdrop-blur-[10px]"
>
  <div class="layout-container flex min-h-18 items-center justify-between gap-4">
    <a
      routerLink="/"
      class="flex min-w-0 items-center gap-3 font-bold text-gray-800 no-underline hover:text-gray-900"
    >
      <span
        class="grid size-9 shrink-0 place-items-center rounded-xl bg-blue-600 text-sm text-white"
        >CM</span
      >
      <span class="truncate">Case Management Platform</span>
    </a>

    <nav class="hidden gap-6 min-[901px]:flex" aria-label="Main">
      <a
        class="font-medium text-gray-700 no-underline hover:text-gray-900"
        routerLink="/"
        fragment="features"
        (click)="onInPageSectionClick('features', $event)"
        >Features</a
      >
      <a
        class="font-medium text-gray-700 no-underline hover:text-gray-900"
        routerLink="/"
        fragment="how-it-works"
        (click)="onInPageSectionClick('how-it-works', $event)"
        >How it works</a
      >
      <a
        class="font-medium text-gray-700 no-underline hover:text-gray-900"
        routerLink="/"
        fragment="about"
        (click)="onInPageSectionClick('about', $event)"
        >About</a
      >
    </nav>

    <div class="flex shrink-0 items-center gap-2">
      <button
        type="button"
        class="inline-flex min-h-11 min-w-11 items-center justify-center rounded-lg border border-gray-300 bg-white text-gray-800 min-[901px]:hidden"
        (click)="toggleMobileNav()"
        [attr.aria-expanded]="mobileNavOpen()"
        [attr.aria-controls]="mobileNavOpen() ? 'public-header-mobile-nav' : null"
        [attr.aria-label]="mobileNavOpen() ? 'Close menu' : 'Open menu'"
      >
        @if (mobileNavOpen()) {
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="size-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
            aria-hidden="true"
          >
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        } @else {
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="size-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
            aria-hidden="true"
          >
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        }
      </button>

      <a
        class="btn-public-outline max-[900px]:hidden inline-flex items-center justify-center no-underline"
        routerLink="/auth/sign-in"
      >
        Sign in
      </a>
    </div>
  </div>

  @if (mobileNavOpen()) {
    <div
      id="public-header-mobile-nav"
      class="border-t border-gray-200 bg-[rgba(248,250,252,0.98)] min-[901px]:hidden"
    >
      <nav class="layout-container flex flex-col py-2" aria-label="Main">
        <a
          id="public-header-mobile-nav-first"
          class="rounded-lg py-3 font-medium text-gray-700 no-underline hover:bg-slate-100 hover:text-gray-900"
          routerLink="/"
          fragment="features"
          (click)="onInPageSectionClick('features', $event)"
          >Features</a
        >
        <a
          class="rounded-lg py-3 font-medium text-gray-700 no-underline hover:bg-slate-100 hover:text-gray-900"
          routerLink="/"
          fragment="how-it-works"
          (click)="onInPageSectionClick('how-it-works', $event)"
          >How it works</a
        >
        <a
          class="rounded-lg py-3 font-medium text-gray-700 no-underline hover:bg-slate-100 hover:text-gray-900"
          routerLink="/"
          fragment="about"
          (click)="onInPageSectionClick('about', $event)"
          >About</a
        >
        <a
          class="btn-public-outline mt-2 flex w-full items-center justify-center no-underline"
          routerLink="/auth/sign-in"
        >
          Sign in
        </a>
      </nav>
    </div>
  }
</header>
