<aside
  class="flex flex-col border-b border-slate-400/12 border-r-0 bg-[rgba(2,6,23,0.45)] p-5 backdrop-blur-[18px] min-[981px]:border-b-0 min-[981px]:border-r"
>
  <div class="mb-7">
    <a routerLink="/" class="inline-flex items-center gap-3 font-bold text-gray-50 no-underline">
      <span
        class="inline-flex h-9 w-9 items-center justify-center rounded-xl bg-gradient-to-br from-blue-500 to-indigo-500 text-[0.95rem] text-white shadow-[0_10px_30px_rgba(59,130,246,0.3)]"
        >CM</span
      >
      <span class="text-base tracking-[0.01em]">CaseFlow</span>
    </a>

    <p class="mb-1.5 mt-6 text-[0.72rem] font-bold uppercase tracking-[0.14em] text-blue-300">
      Workspace
    </p>
    <h2 class="m-0 text-xl text-slate-50">Demo Organization</h2>
  </div>

  <nav class="grid gap-2">
    <a
      routerLink="/app"
      [routerLinkActiveOptions]="{ exact: true }"
      routerLinkActive="bg-blue-500/14 border-blue-400/22 text-slate-50 shadow-[inset_0_1px_0_rgba(255,255,255,0.03)]"
      class="flex items-center gap-[0.85rem] rounded-2xl border border-transparent px-4 py-[0.9rem] text-slate-300 no-underline transition-all duration-200 hover:bg-white/5 hover:text-slate-50"
    >
      <span class="w-[1.2rem] text-center opacity-90">⌂</span>
      <span>Dashboard</span>
    </a>

    <a
      routerLink="/app/cases"
      routerLinkActive="bg-blue-500/14 border-blue-400/22 text-slate-50 shadow-[inset_0_1px_0_rgba(255,255,255,0.03)]"
      class="flex items-center gap-[0.85rem] rounded-2xl border border-transparent px-4 py-[0.9rem] text-slate-300 no-underline transition-all duration-200 hover:bg-white/5 hover:text-slate-50"
    >
      <span class="w-[1.2rem] text-center opacity-90">▣</span>
      <span>Cases</span>
    </a>

    <a
      routerLink="/app/tasks"
      routerLinkActive="bg-blue-500/14 border-blue-400/22 text-slate-50 shadow-[inset_0_1px_0_rgba(255,255,255,0.03)]"
      class="flex items-center gap-[0.85rem] rounded-2xl border border-transparent px-4 py-[0.9rem] text-slate-300 no-underline transition-all duration-200 hover:bg-white/5 hover:text-slate-50"
    >
      <span class="w-[1.2rem] text-center opacity-90">✓</span>
      <span>Tasks</span>
    </a>

    <a
      routerLink="/app/calendar"
      routerLinkActive="bg-blue-500/14 border-blue-400/22 text-slate-50 shadow-[inset_0_1px_0_rgba(255,255,255,0.03)]"
      class="flex items-center gap-[0.85rem] rounded-2xl border border-transparent px-4 py-[0.9rem] text-slate-300 no-underline transition-all duration-200 hover:bg-white/5 hover:text-slate-50"
    >
      <span class="w-[1.2rem] text-center opacity-90">◫</span>
      <span>Calendar</span>
    </a>

    <a
      routerLink="/app/settings"
      routerLinkActive="bg-blue-500/14 border-blue-400/22 text-slate-50 shadow-[inset_0_1px_0_rgba(255,255,255,0.03)]"
      class="flex items-center gap-[0.85rem] rounded-2xl border border-transparent px-4 py-[0.9rem] text-slate-300 no-underline transition-all duration-200 hover:bg-white/5 hover:text-slate-50"
    >
      <span class="w-[1.2rem] text-center opacity-90">⚙</span>
      <span>Settings</span>
    </a>
  </nav>

  <div class="mt-auto hidden pt-6 min-[981px]:block">
    <div
      class="rounded-[1.25rem] border border-slate-400/14 bg-slate-900/75 p-4 shadow-[0_10px_30px_rgba(2,6,23,0.25),inset_0_1px_0_rgba(255,255,255,0.03)]"
    >
      <p class="mb-1.5 mt-0 text-[0.72rem] font-bold uppercase tracking-[0.14em] text-blue-300">
        Current plan
      </p>
      <h3 class="m-0 text-base text-slate-50">Portfolio Demo</h3>
      <p class="mb-0 mt-2 text-[0.92rem] leading-normal text-slate-300">
        A clean Angular + .NET case management platform demo.
      </p>
    </div>
  </div>
</aside>
