<aside
  id="protected-app-sidebar"
  aria-label="Workspace navigation"
  class="flex min-h-0 flex-col border-b border-gray-200 border-r-0 bg-white p-5 shadow-sm max-[980px]:fixed max-[980px]:left-0 max-[980px]:top-0 max-[980px]:z-50 max-[980px]:h-dvh max-[980px]:w-[min(280px,88vw)] max-[980px]:border-b-0 max-[980px]:border-r max-[980px]:shadow-[8px_0_32px_rgba(15,23,42,0.08)] max-[980px]:transition-transform max-[980px]:duration-200 max-[980px]:ease-out min-[981px]:static min-[981px]:h-full min-[981px]:w-[280px] min-[981px]:shrink-0 min-[981px]:border-b-0 min-[981px]:border-r min-[981px]:bg-[rgba(255,255,255,0.85)] min-[981px]:shadow-none"
  [ngClass]="layout.mobileNavOpen() ? 'max-[980px]:translate-x-0' : 'max-[980px]:-translate-x-full'"
>
  <div class="mb-7">
    <a routerLink="/" class="inline-flex items-center gap-3 font-bold text-gray-900 no-underline hover:text-gray-950">
      <span
        class="inline-flex h-9 w-9 items-center justify-center rounded-xl bg-gradient-to-br from-blue-500 to-indigo-500 text-[0.95rem] text-white shadow-[0_10px_30px_rgba(59,130,246,0.25)]"
        >CM</span
      >
      <span class="text-base tracking-[0.01em]">CaseFlow</span>
    </a>

    <p class="mb-1.5 mt-6 text-[0.72rem] font-bold uppercase tracking-[0.14em] text-blue-600">
      Workspace
    </p>
    <h2 class="m-0 text-xl text-gray-900">Demo Organization</h2>
  </div>

  <nav class="grid gap-2">
    <a
      routerLink="/app"
      [routerLinkActiveOptions]="{ exact: true }"
      routerLinkActive="border border-blue-200 bg-blue-50 text-gray-900 shadow-sm"
      class="flex items-center gap-[0.85rem] rounded-2xl border border-transparent px-4 py-[0.9rem] text-gray-600 no-underline transition-all duration-200 hover:bg-gray-50 hover:text-gray-900"
    >
      <span class="w-[1.2rem] text-center opacity-90">⌂</span>
      <span>Dashboard</span>
    </a>

    <a
      routerLink="/app/cases"
      routerLinkActive="border border-blue-200 bg-blue-50 text-gray-900 shadow-sm"
      class="flex items-center gap-[0.85rem] rounded-2xl border border-transparent px-4 py-[0.9rem] text-gray-600 no-underline transition-all duration-200 hover:bg-gray-50 hover:text-gray-900"
    >
      <span class="w-[1.2rem] text-center opacity-90">▣</span>
      <span>Cases</span>
    </a>

    <a
      routerLink="/app/settings"
      routerLinkActive="border border-blue-200 bg-blue-50 text-gray-900 shadow-sm"
      class="flex items-center gap-[0.85rem] rounded-2xl border border-transparent px-4 py-[0.9rem] text-gray-600 no-underline transition-all duration-200 hover:bg-gray-50 hover:text-gray-900"
    >
      <span class="w-[1.2rem] text-center opacity-90">⚙</span>
      <span>Settings</span>
    </a>

    <a
      routerLink="/demo"
      class="mt-1 flex items-center gap-[0.85rem] rounded-2xl border border-transparent px-4 py-[0.9rem] text-gray-600 no-underline transition-all duration-200 hover:bg-gray-50 hover:text-gray-900 min-[981px]:hidden"
    >
      <span class="w-[1.2rem] text-center opacity-90">↗</span>
      <span>View Demo</span>
    </a>
  </nav>

  <div class="mt-auto hidden pt-6 min-[981px]:block">
    <div
      class="rounded-[1.25rem] border border-gray-200 bg-slate-50 p-4 shadow-sm"
    >
      <p class="mb-1.5 mt-0 text-[0.72rem] font-bold uppercase tracking-[0.14em] text-blue-600">
        Current plan
      </p>
      <h3 class="m-0 text-base text-gray-900">Portfolio Demo</h3>
      <p class="mb-0 mt-2 text-[0.92rem] leading-normal text-gray-600">
        A clean Angular + .NET case management platform demo.
      </p>
    </div>
  </div>
</aside>
