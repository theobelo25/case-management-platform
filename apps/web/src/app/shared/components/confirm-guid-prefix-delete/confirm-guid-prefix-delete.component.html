<div class="rounded-3xl border border-rose-200 bg-white p-6 shadow-md sm:p-8">
  <div class="space-y-2">
    <p class="m-0 text-xs font-semibold uppercase tracking-[0.12em] text-rose-700">
      {{ headline() }}
    </p>
    <h2
      id="confirm-delete-title"
      class="m-0 text-pretty text-xl font-semibold leading-snug tracking-tight text-foreground sm:text-2xl"
    >
      Confirm permanent deletion
    </h2>
  </div>
  <div class="mt-5 space-y-3 text-base leading-relaxed">
    <p class="m-0 font-medium text-foreground">This action cannot be undone.</p>
    <p class="m-0 text-muted-foreground">
      Type the <span class="font-medium text-foreground">first six characters</span> of the ID below,
      exactly as shown in the box.
    </p>
  </div>
  <p
    class="mt-5 rounded-xl border border-gray-200 bg-slate-100 px-4 py-3 font-mono text-lg font-medium tracking-[0.08em] text-foreground"
    id="guid-prefix-to-match"
  >
    {{ expectedPrefix() }}
  </p>
  <div class="mt-5 flex flex-col gap-2">
    <label class="text-sm font-medium text-foreground" for="confirmGuidPrefix">
      First six characters of ID
    </label>
    <input
      id="confirmGuidPrefix"
      type="text"
      name="confirmGuidPrefix"
      autocomplete="off"
      autocapitalize="off"
      spellcheck="false"
      [value]="typedValue()"
      (input)="typedValue.set($any($event.target).value)"
      [attr.aria-invalid]="typedValue().length > 0 && !canConfirm()"
      aria-describedby="guid-prefix-to-match"
      class="w-full rounded-lg border border-gray-300 bg-white px-3 py-2.5 text-base text-foreground outline-none focus:border-rose-500 focus:ring-2 focus:ring-rose-500/25"
    />
    @if (typedValue().length > 0 && !canConfirm()) {
      <p class="text-sm leading-snug text-amber-800" role="status">That does not match yet.</p>
    }
  </div>
  <div class="mt-8 flex flex-wrap justify-end gap-3 border-t border-border pt-6">
    <button
      type="button"
      class="rounded-xl border border-gray-300 bg-white px-5 py-2.5 text-base font-medium text-gray-800 shadow-sm transition hover:bg-gray-50 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-gray-400 disabled:cursor-not-allowed disabled:opacity-45"
      [disabled]="isSubmitting()"
      (click)="cancelled.emit()"
    >
      Cancel
    </button>
    <button
      type="button"
      class="rounded-xl border border-rose-300 bg-rose-600 px-5 py-2.5 text-base font-medium text-white shadow-sm transition hover:border-rose-400 hover:bg-rose-700 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-rose-500 disabled:cursor-not-allowed disabled:opacity-45"
      [disabled]="!canConfirm() || isSubmitting()"
      (click)="confirmed.emit()"
    >
      @if (isSubmitting()) {
        Deleting…
      } @else {
        Delete permanently
      }
    </button>
  </div>
</div>
