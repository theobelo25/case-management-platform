<section id="features" class="landing-section-y">
  <div class="layout-container">
    <div class="mb-8 max-w-180">
      <p class="landing-eyebrow">Features</p>
      <h2 class="landing-section-h2">A strong foundation for enterprise workflows</h2>
      <p class="m-0 leading-relaxed text-gray-600">
        This starter shell is intentionally simple, but it already points toward the kind of
        architecture used in real internal tools.
      </p>
    </div>

    <div class="grid grid-cols-1 gap-5 min-[901px]:grid-cols-2">
      @for (feature of features; track feature.title) {
        <article
          class="rounded-[1.25rem] border border-gray-200 bg-white p-6 shadow-[0_10px_30px_rgba(15,23,42,0.04)]"
        >
          <h3 class="mb-3 mt-0 text-lg font-bold">{{ feature.title }}</h3>
          <p class="m-0 leading-relaxed text-gray-600">{{ feature.description }}</p>
        </article>
      }
    </div>
  </div>
</section>
