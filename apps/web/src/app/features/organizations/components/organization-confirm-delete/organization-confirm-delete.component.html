<div
  class="rounded-3xl border border-rose-500/20 bg-slate-900/72 p-6 shadow-[0_16px_40px_rgba(2,6,23,0.22),inset_0_1px_0_rgba(255,255,255,0.03)]"
>
  <p class="mb-2 mt-0 text-xs font-bold uppercase tracking-[0.14em] text-rose-300">
    Delete organization
  </p>
  <h2 id="confirm-delete-title" class="m-0 text-lg font-semibold text-slate-50">
    Confirm permanent deletion
  </h2>
  <p class="mb-0 mt-3 max-w-2xl leading-[1.7] text-slate-400">
    This cannot be undone. To confirm, type the organization name exactly as shown below.
  </p>
  <p
    class="mt-4 rounded-xl border border-slate-500/25 bg-slate-950/50 px-3 py-2.5 font-mono text-sm text-slate-200"
    id="organization-name-to-match"
  >
    {{ organizationName() }}
  </p>
  <div class="mt-5 flex flex-col gap-1">
    <label class="text-xs font-medium text-slate-300 sm:text-sm" for="confirmOrganizationName">
      Organization name
    </label>
    <input
      id="confirmOrganizationName"
      type="text"
      name="confirmOrganizationName"
      autocomplete="off"
      autocapitalize="off"
      spellcheck="false"
      [value]="typedName()"
      (input)="typedName.set($any($event.target).value)"
      [attr.aria-invalid]="
        typedName().length > 0 && typedName().trim() !== organizationName().trim()
      "
      aria-describedby="organization-name-to-match"
      class="w-full rounded-lg border border-slate-500/30 bg-slate-950/50 px-2.5 py-2 text-sm text-slate-100 outline-none focus:border-rose-500/50 focus:ring-2 focus:ring-rose-500/40"
    />
    @if (typedName().length > 0 && typedName().trim() !== organizationName().trim()) {
      <p class="text-xs leading-tight text-amber-400/90 sm:text-sm" role="status">
        Name does not match yet.
      </p>
    }
  </div>
  <div class="mt-6 flex flex-wrap justify-end gap-3 border-t border-slate-500/20 pt-6">
    <button
      type="button"
      class="rounded-xl border border-slate-400/25 bg-white/5 px-4 py-2.5 text-sm font-medium text-slate-200 transition hover:border-slate-400/40 hover:bg-white/[0.07] focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-slate-400/50 disabled:cursor-not-allowed disabled:opacity-45"
      [disabled]="isSubmitting()"
      (click)="cancelled.emit()"
    >
      Cancel
    </button>
    <button
      type="button"
      class="rounded-xl border border-rose-500/40 bg-rose-950/35 px-4 py-2.5 text-sm font-medium text-rose-100 transition hover:border-rose-400/55 hover:bg-rose-950/50 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-rose-400/60 disabled:cursor-not-allowed disabled:opacity-45 disabled:hover:border-rose-500/40 disabled:hover:bg-rose-950/35"
      [disabled]="typedName().trim() !== organizationName().trim() || isSubmitting()"
      (click)="confirmed.emit()"
    >
      @if (isSubmitting()) {
        Deleting…
      } @else {
        Delete permanently
      }
    </button>
  </div>
</div>
