<div
  class="rounded-3xl border border-slate-400/14 bg-slate-900/72 p-6 shadow-[0_16px_40px_rgba(2,6,23,0.22),inset_0_1px_0_rgba(255,255,255,0.03)]"
>
  <div class="flex flex-wrap items-start justify-between gap-4">
    <div>
      <p class="mb-2 mt-0 text-xs font-bold uppercase tracking-[0.14em] text-blue-300">
        Workspace status
      </p>
      <h2 class="m-0 text-lg font-semibold text-slate-50">Archive or delete this organization</h2>
      <p class="mb-0 mt-3 max-w-2xl leading-[1.7] text-slate-400">
        Archiving hides the organization from normal use and can be reversed. Deleting permanently
        removes the organization and cannot be undone.
      </p>
    </div>
  </div>
  <div class="mt-6 flex flex-wrap gap-3 border-t border-slate-500/20 pt-6">
    @if (!isArchived()) {
      <button
        type="button"
        class="rounded-xl border border-amber-500/35 bg-amber-500/10 px-4 py-2.5 text-sm font-medium text-amber-100 transition hover:border-amber-400/50 hover:bg-amber-500/[0.14] focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-amber-400/60"
        (click)="archiveRequested.emit()"
      >
        Archive organization
      </button>
    } @else {
      <button
        type="button"
        class="rounded-xl border border-emerald-500/35 bg-amber-500/10 px-4 py-2.5 text-sm font-medium text-amber-100 transition hover:border-amber-400/50 hover:bg-amber-500/[0.14] focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-amber-400/60"
        (click)="unarchiveRequested.emit()"
      >
        Unarchive organization
      </button>
    }

    <button
      type="button"
      class="rounded-xl border border-rose-500/40 bg-rose-950/35 px-4 py-2.5 text-sm font-medium text-rose-100 transition hover:border-rose-400/55 hover:bg-rose-950/50 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-rose-400/60"
      (click)="deleteRequested.emit()"
    >
      Delete organization
    </button>
  </div>
</div>
