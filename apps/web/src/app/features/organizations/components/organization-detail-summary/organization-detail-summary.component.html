<div class="rounded-3xl border border-border bg-card p-6 shadow-sm">
  <p class="mb-2 mt-0 text-xs font-bold uppercase tracking-[0.14em] text-blue-600">Organization</p>
  <div class="flex flex-wrap items-center gap-2.5">
    <h2 class="m-0 text-xl font-semibold text-foreground">{{ organization().name }}</h2>
    @if (organization().isArchived) {
      <span
        class="inline-flex shrink-0 rounded-lg bg-amber-100 px-2.5 py-1 text-xs font-medium text-amber-900 ring-1 ring-amber-200/80"
        role="status"
        >Archived</span
      >
    }
  </div>
  <dl class="mt-6 grid gap-4 sm:grid-cols-2">
    <div>
      <dt class="m-0 text-[0.72rem] font-medium uppercase tracking-[0.08em] text-muted-foreground">Organization ID</dt>
      <dd class="mt-1.5 m-0 break-all font-mono text-sm text-foreground">{{ organization().id }}</dd>
    </div>
    <div>
      <dt class="m-0 text-[0.72rem] font-medium uppercase tracking-[0.08em] text-muted-foreground">Created</dt>
      <dd class="mt-1.5 m-0 text-sm text-foreground">
        {{ organization().createdAtUtc | date: 'medium' }}
      </dd>
    </div>
  </dl>
</div>
