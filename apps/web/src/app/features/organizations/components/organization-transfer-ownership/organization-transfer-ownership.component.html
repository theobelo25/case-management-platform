<div class="rounded-3xl border border-blue-200 bg-white p-6 shadow-md">
  <p class="mb-2 mt-0 text-xs font-bold uppercase tracking-[0.14em] text-blue-600">
    Transfer ownership
  </p>
  <h2 id="transfer-ownership-title" class="m-0 text-lg font-semibold text-foreground">
    Choose the new owner
  </h2>
  <p class="mb-0 mt-3 max-w-2xl leading-[1.7] text-muted-foreground">
    You will become a member after this transfer. Only existing members can receive ownership.
  </p>
  @if (candidates().length === 0) {
    <p class="mb-0 mt-4 text-sm text-amber-800">Add another member to the organization first.</p>
  } @else {
    <div class="mt-5 flex flex-col gap-1">
      <label class="text-xs font-medium text-foreground sm:text-sm" for="newOwnerSelect">
        New owner
      </label>
      <select
        id="newOwnerSelect"
        name="newOwner"
        class="w-full rounded-lg border border-gray-300 bg-white px-2.5 py-2 text-sm text-foreground outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/25"
        [value]="selectedUserId() ?? ''"
        (change)="selectedUserId.set($any($event.target).value)"
      >
        @for (m of candidates(); track m.id) {
          <option [value]="m.id">{{ m.name }} ({{ m.role }})</option>
        }
      </select>
    </div>
  }
  <div class="mt-6 flex flex-wrap justify-end gap-3 border-t border-border pt-6">
    <button
      type="button"
      class="rounded-xl border border-gray-300 bg-white px-4 py-2.5 text-sm font-medium text-gray-800 shadow-sm transition hover:bg-gray-50 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-gray-400 disabled:cursor-not-allowed disabled:opacity-45"
      [disabled]="isSubmitting()"
      (click)="cancelled.emit()"
    >
      Cancel
    </button>
    <button
      type="button"
      class="rounded-xl border border-blue-600 bg-blue-600 px-4 py-2.5 text-sm font-medium text-white shadow-sm transition hover:border-blue-700 hover:bg-blue-700 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-blue-500 disabled:cursor-not-allowed disabled:opacity-45"
      [disabled]="candidates().length === 0 || selectedUserId() === null || isSubmitting()"
      (click)="confirmed.emit(selectedUserId()!)"
    >
      @if (isSubmitting()) {
        Transferring…
      } @else {
        Transfer ownership
      }
    </button>
  </div>
</div>
