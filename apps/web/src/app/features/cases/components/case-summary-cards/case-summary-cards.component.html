<div class="grid gap-3 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5">
  @for (card of cards(); track trackByLabel($index, card)) {
    <article
      class="flex flex-col rounded-xl border border-border bg-white p-3.5 shadow-sm"
    >
      <p class="text-[11px] font-semibold uppercase leading-tight tracking-[0.08em] text-muted-foreground">
        {{ card.label }}
      </p>
      <p class="mt-1.5 text-2xl font-semibold tabular-nums leading-none tracking-tight text-foreground">
        {{ card.value }}
      </p>
      <p class="mt-1.5 text-xs leading-snug text-muted-foreground">
        {{ card.helperText }}
      </p>
    </article>
  }
</div>
