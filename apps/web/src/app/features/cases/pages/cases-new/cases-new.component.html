<div class="flex flex-col gap-8">
  <section class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
    <div class="space-y-1">
      <h1 class="text-3xl font-semibold tracking-tight text-foreground">New Case</h1>
      <p class="text-sm text-muted-foreground">
        Capture case details and create a record for your team to review.
      </p>
    </div>

    <a
      routerLink="/app/cases"
      class="inline-flex items-center justify-center rounded-xl border border-border bg-background px-4 py-2 text-sm font-medium text-foreground shadow-sm transition hover:bg-accent"
    >
      Back to Cases
    </a>
  </section>

  <section class="rounded-2xl border border-border bg-card shadow-sm">
    <div class="border-b border-border p-6">
      <h2 class="text-lg font-semibold text-foreground">Case Details</h2>
      <p class="mt-1 text-sm text-muted-foreground">
        Fill out the form below to submit a new case.
      </p>
    </div>

    <div class="p-6">
      <app-case-form />
    </div>
  </section>
</div>
