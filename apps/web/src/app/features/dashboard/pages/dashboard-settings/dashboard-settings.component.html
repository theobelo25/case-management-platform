<section class="grid gap-6">
  <div
    class="rounded-3xl border border-border bg-card p-6 shadow-sm"
  >
    <p class="mb-2 mt-0 text-xs font-bold uppercase tracking-[0.14em] text-blue-600">Settings</p>
    @if (sessionSnapshot(); as s) {
      <h2 class="m-0 text-[1.8rem] text-foreground">Welcome, {{ userDisplayName(s) }}</h2>
      <p class="text-sm text-muted-foreground">{{ s.email }}</p>
    } @else {
      <h2 class="m-0 text-[1.8rem] text-foreground">Welcome back</h2>
    }
    <p class="mb-0 mt-[0.85rem] max-w-2xl leading-[1.7] text-muted-foreground">
      These are your app settings. From here you can update your profile, and manage general app
      settings.
    </p>
  </div>
  <div
    class="rounded-3xl border border-border bg-card p-6 shadow-sm"
  >
    <p class="mb-2 mt-0 text-xs font-bold uppercase tracking-[0.14em] text-blue-600">
      Update Profile
    </p>

    <app-update-profile-form />
  </div>
</section>
