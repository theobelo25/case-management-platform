name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  api:
    name: API — build, test, coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/global.json

      - name: Restore
        run: dotnet restore apps/api/CaseManagement.slnx

      - name: Build (Release, warnings as errors)
        run: dotnet build apps/api/CaseManagement.slnx --no-restore --configuration Release

      - name: Test (unit, architecture, HTTP integration) + coverage
        run: |
          dotnet test apps/api/CaseManagement.slnx \
            --no-build \
            --configuration Release \
            --logger "trx;LogFilePrefix=api-tests" \
            --results-directory "${{ github.workspace }}/artifacts/test-results" \
            --collect:"XPlat Code Coverage" \
            --settings apps/api/coverlet.runsettings

      - name: Upload test & coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-ci-logs
          path: |
            artifacts/test-results/**/*
          if-no-files-found: warn

  web:
    name: Web — install, lint, test, and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint Angular app
        run: pnpm --filter web lint

      - name: Unit tests (Vitest, ng test)
        run: pnpm web:test:ci

      - name: Build Angular app
        run: pnpm --filter web build
